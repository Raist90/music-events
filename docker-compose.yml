services:
  db:
    container_name: db
    image: postgres
    restart: always
    shm_size: 128mb
    env_file:
      - ./apps/backend/.env.development.docker
    ports:
      - "5432:5432"
    networks:
      - app-network
  backend:
    container_name: backend
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./apps/backend/.env.development.docker
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - app-network
  frontend:
    container_name: frontend
    build:
      context: ./apps/frontend
      dockerfile: dev.Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./apps/frontend/.env.development.docker
    restart: always
    depends_on:
      - backend
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
